services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: desafio-estagio
    ports:
      - "5466:5432"
    volumes:
      - ./docker:/docker-entrypoint-initdb.d
      - pgdata:/bitnami/postgresql

volumes:
  pgdata: